<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Global Reciprocal Colleges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/login.css">
</head>
<body>
  <div class="page">
    <section class="brand-panel" aria-label="Global Reciprocal Colleges">
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
      <div class="wave wave-3"></div>
      <div class="logo-circle">
        <img src="assets/logo.png" alt="Global Reciprocal Colleges" class="logo-img">
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <h1>LOGIN</h1>
        <p class="signup-prompt">Don't have an Account? <a href="signup.html">Sign up</a></p>

        <form id="loginForm" novalidate>
          <div class="role-select" id="roleSelect">
            <button type="button" class="role-trigger" id="roleTrigger" aria-haspopup="listbox" aria-expanded="false">
              <span id="roleLabel">Admin</span>
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="role-menu" role="listbox" id="roleMenu">
              <button type="button" class="role-option" data-role="student">Student</button>
              <button type="button" class="role-option" data-role="faculty">Faculty</button>
              <button type="button" class="role-option active" data-role="admin">Admin</button>
            </div>
            <input type="hidden" name="role" id="roleInput" value="admin">
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password">
          </div>

          <div class="field">
            <label for="employeeId">Employee ID</label>
            <input type="text" id="employeeId" name="employeeId" placeholder="20-202-2200">
          </div>

          <button type="submit" class="btn-login">Login</button>
        </form>

        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
    </section>
  </div>

  <script src="assets/login.js"></script>
  <script>initLoginPage('admin');</script>
</body>
</html>
